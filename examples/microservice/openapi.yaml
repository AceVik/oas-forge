openapi: 3.1.0
info:
  title: Microservice API
  version: 1.0.0
  description: Example microservice demonstrating cross-crate template transport
components:
  schemas:
    User:
      properties:
        id:
          format: int64
          type: integer
        name:
          type: string
      required:
      - id
      - name
      type: object
    Paginated_User:
      properties:
        items:
          items:
            $ref: '#/components/schemas/User'
          type: array
        page:
          format: int64
          type: integer
        total:
          format: int64
          type: integer
      required:
      - items
      - total
      - page
      type: object
paths:
  /users:
    get:
      operationId: list_users
      parameters: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Paginated_User'
          description: Paginated list of users
      summary: List all users with pagination
      tags:
      - Users
